<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Admin Dashboard | Vedant's Bungalow</title>
    <script src="../js/runtime-config.js"></script>
    <script src="../js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-cream text-slate-900 min-h-screen">
    <div data-include="header"></div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-serif text-forest">Dashboard</h1>
                <p class="text-slate-500 text-sm mt-1">Bookings, calendar blocks, inquiries & reviews.</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <span id="admin-email-label" class="text-sm text-slate-500 self-center"></span>
                <button type="button" id="admin-signout" class="px-4 py-2 rounded-xl border border-slate-200 bg-white text-sm font-semibold hover:bg-slate-50">Sign out</button>
                <a href="/index.html" class="px-4 py-2 rounded-xl btn-gradient text-white text-sm font-semibold text-center">View site</a>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-8" role="tablist">
            <button type="button" data-tab="bookings" class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-forest text-white">Bookings</button>
            <button type="button" data-tab="calendar" class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-white border border-orange-100">Calendar</button>
            <button type="button" data-tab="inquiries" class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-white border border-orange-100">Inquiries</button>
            <button type="button" data-tab="reviews" class="tab-btn px-4 py-2 rounded-full text-sm font-semibold bg-white border border-orange-100">Reviews</button>
        </div>

        <section id="panel-bookings" class="tab-panel space-y-4">
            <div class="flex flex-wrap gap-3 items-center">
                <label class="text-sm text-slate-500">Status</label>
                <select id="filter-booking-status" class="rounded-xl border border-orange-100 px-3 py-2 text-sm bg-white">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="paid">Paid</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <button type="button" id="reload-bookings" class="text-sm font-semibold text-terracotta">Refresh</button>
            </div>
            <div class="overflow-x-auto bg-white rounded-2xl border border-orange-50 shadow-sm">
                <table class="min-w-full text-sm">
                    <thead class="bg-slate-50 text-left text-xs uppercase text-slate-400">
                        <tr>
                            <th class="px-4 py-3">Code</th>
                            <th class="px-4 py-3">Guest</th>
                            <th class="px-4 py-3">Stay</th>
                            <th class="px-4 py-3">Total</th>
                            <th class="px-4 py-3">Status</th>
                            <th class="px-4 py-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-tbody"></tbody>
                </table>
            </div>
        </section>

        <section id="panel-calendar" class="tab-panel hidden space-y-4">
            <div class="bg-white rounded-2xl border border-orange-50 p-6 shadow-sm max-w-lg">
                <h2 class="font-serif text-lg text-forest mb-4">Block dates</h2>
                <div class="grid sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Property</label>
                        <select id="block-property" class="mt-1 w-full rounded-xl border border-orange-100 px-3 py-2 text-sm">
                            <option value="grand_villa">Grand Villa</option>
                            <option value="cozy_cottage">Cozy Cottage</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Date</label>
                        <input id="block-date" type="date" class="mt-1 w-full rounded-xl border border-orange-100 px-3 py-2 text-sm">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="text-xs font-bold text-slate-400 uppercase">Reason (optional)</label>
                        <input id="block-reason" type="text" class="mt-1 w-full rounded-xl border border-orange-100 px-3 py-2 text-sm" placeholder="Maintenance / personal use">
                    </div>
                </div>
                <button type="button" id="block-add-btn" class="mt-4 w-full btn-gradient text-white py-3 rounded-xl font-bold text-sm">Add block</button>
                <p id="block-msg" class="text-xs mt-3 hidden font-semibold"></p>
            </div>
            <div class="overflow-x-auto bg-white rounded-2xl border border-orange-50 shadow-sm">
                <table class="min-w-full text-sm">
                    <thead class="bg-slate-50 text-left text-xs uppercase text-slate-400">
                        <tr>
                            <th class="px-4 py-3">Property</th>
                            <th class="px-4 py-3">Date</th>
                            <th class="px-4 py-3">Reason</th>
                            <th class="px-4 py-3"></th>
                        </tr>
                    </thead>
                    <tbody id="blocked-tbody"></tbody>
                </table>
            </div>
        </section>

        <section id="panel-inquiries" class="tab-panel hidden space-y-4">
            <button type="button" id="reload-inquiries" class="text-sm font-semibold text-terracotta">Refresh</button>
            <div id="inquiries-list" class="space-y-3"></div>
        </section>

        <section id="panel-reviews" class="tab-panel hidden space-y-4">
            <button type="button" id="reload-reviews" class="text-sm font-semibold text-terracotta">Refresh</button>
            <div id="reviews-list" class="space-y-3"></div>
        </section>
    </div>

    <div data-include="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
